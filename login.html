<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #3498db; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #2980b9; }
        .error { color: #e74c3c; font-size: 14px; margin-top: 10px; display: none; }
        .link { display: block; margin-top: 15px; font-size: 14px; color: #7f8c8d; text-decoration: none; }
        .link:hover { color: #3498db; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🔒 เข้าสู่ระบบ Admin</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">เข้าสู่ระบบ</button>
        <div id="error-msg" class="error">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</div>
        <a href="/register" class="link">ยังไม่มีบัญชี? สมัครสมาชิกที่นี่</a>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/admin';
                } else {
                    errorMsg.innerText = data.message || "ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!";
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                alert("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>

</body>
</html>
