<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Admin</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 300px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; outline: none; font-size: 14px; box-sizing: border-box; }
        input:focus { border-color: #2ecc71; }
        button { width: 100%; padding: 12px; background: #2ecc71; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.2s; }
        button:hover { background: #27ae60; }
        .msg { font-size: 14px; margin-top: 10px; display: none; font-weight: bold; }
        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
        .link { display: block; margin-top: 15px; font-size: 14px; color: #7f8c8d; text-decoration: none; }
        .link:hover { color: #3498db; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>📝 สร้างบัญชีผู้เช่า</h2>
        <input type="text" id="username" placeholder="ตั้งชื่อ Username">
        <input type="password" id="password" placeholder="ตั้งรหัสผ่าน">
        <button onclick="register()">สมัครสมาชิก</button>
        <div id="status-msg" class="msg"></div>
        <a href="/login" class="link">มีบัญชีอยู่แล้ว? กลับไปเข้าสู่ระบบ</a>
    </div>

    <script>
        async function register() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const statusMsg = document.getElementById('status-msg');

            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                
                const data = await res.json();
                
                statusMsg.style.display = 'block';
                if (data.success) {
                    statusMsg.className = 'msg success';
                    statusMsg.innerText = "✅ " + data.message + " กำลังไปหน้าล็อกอิน...";
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    statusMsg.className = 'msg error';
                    statusMsg.innerText = "❌ " + data.message;
                }
            } catch (error) {
                alert("❌ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้");
            }
        }

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') register();
        });
    </script>

</body>
</html>
